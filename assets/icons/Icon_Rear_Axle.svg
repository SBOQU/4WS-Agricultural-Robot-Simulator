<svg viewBox="0 0 60 60" width="60" height="60" xmlns="http://www.w3.org/2000/svg">

  <!-- Central spine — chassis backbone, pink vertical -->
  <line x1="30" y1="14" x2="30" y2="46"
        stroke="#ff00cc" stroke-width="1.6" opacity="0.85"
        stroke-linecap="round"/>

  <!-- Front direction chevron — points up = forward -->
  <polygon points="30,8 26.5,13.5 33.5,13.5"
           fill="#ff00cc" opacity="0.75"/>

  <!-- Front axle — yellow horizontal -->
  <line x1="18" y1="18" x2="42" y2="18"
        stroke="#ffe566" stroke-width="1.3" opacity="0.7"
        stroke-linecap="round"/>

  <!-- Rear axle — yellow horizontal -->
  <line x1="18" y1="42" x2="42" y2="42"
        stroke="#ffe566" stroke-width="1.3" opacity="0.7"
        stroke-linecap="round"/>

  <!-- Spine/axle intersection nodes — pink dots -->
  <circle cx="30" cy="18" r="1.5" fill="#ff00cc" opacity="0.85"/>
  <circle cx="30" cy="42" r="1.5" fill="#ff00cc" opacity="0.85"/>

  <!-- Rear axle highlight dots — emphasize the active axle -->
  <circle cx="20" cy="42" r="1.4" fill="#ffe566" opacity="0.9"/>
  <circle cx="40" cy="42" r="1.4" fill="#ffe566" opacity="0.9"/>

  <!-- ────────── FRONT-LEFT WHEEL ────────── -->
  <rect x="18.5" y="13.5" width="3" height="9" rx="0.7"
        fill="rgba(255,0,204,0.18)"
        stroke="#ff00cc" stroke-width="1.3" opacity="0.95">
    <animateTransform attributeName="transform" type="rotate"
      calcMode="linear" dur="5s" repeatCount="indefinite"
      keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1"
      values="0 20 18;17.7 20 18;25 20 18;17.7 20 18;0 20 18;-17.7 20 18;-25 20 18;-17.7 20 18;0 20 18"/>
  </rect>

  <!-- ────────── FRONT-RIGHT WHEEL ────────── -->
  <rect x="38.5" y="13.5" width="3" height="9" rx="0.7"
        fill="rgba(255,0,204,0.18)"
        stroke="#ff00cc" stroke-width="1.3" opacity="0.95">
    <animateTransform attributeName="transform" type="rotate"
      calcMode="linear" dur="5s" repeatCount="indefinite"
      keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1"
      values="0 40 18;17.7 40 18;25 40 18;17.7 40 18;0 40 18;-17.7 40 18;-25 40 18;-17.7 40 18;0 40 18"/>
  </rect>

  <!-- ────────── REAR-LEFT WHEEL — opposite phase ────────── -->
  <rect x="18.5" y="37.5" width="3" height="9" rx="0.7"
        fill="rgba(255,0,204,0.18)"
        stroke="#ff00cc" stroke-width="1.3" opacity="0.95">
    <animateTransform attributeName="transform" type="rotate"
      calcMode="linear" dur="5s" repeatCount="indefinite"
      keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1"
      values="0 20 42;-17.7 20 42;-25 20 42;-17.7 20 42;0 20 42;17.7 20 42;25 20 42;17.7 20 42;0 20 42"/>
  </rect>

  <!-- ────────── REAR-RIGHT WHEEL — opposite phase ────────── -->
  <rect x="38.5" y="37.5" width="3" height="9" rx="0.7"
        fill="rgba(255,0,204,0.18)"
        stroke="#ff00cc" stroke-width="1.3" opacity="0.95">
    <animateTransform attributeName="transform" type="rotate"
      calcMode="linear" dur="5s" repeatCount="indefinite"
      keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1"
      values="0 40 42;-17.7 40 42;-25 40 42;-17.7 40 42;0 40 42;17.7 40 42;25 40 42;17.7 40 42;0 40 42"/>
  </rect>

</svg>
