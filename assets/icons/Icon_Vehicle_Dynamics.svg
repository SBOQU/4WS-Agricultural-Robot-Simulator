<svg viewBox="0 0 60 60" width="60" height="60" xmlns="http://www.w3.org/2000/svg">

  <!-- Wheel heading axis — dashed, fixed vertical -->
  <line x1="30" y1="2" x2="30" y2="58"
        stroke="#ff00cc" stroke-width="0.8"
        stroke-dasharray="2.5 2.5" opacity="0.35"/>

  <!-- Hub axis — horizontal yellow -->
  <line x1="11" y1="32" x2="49" y2="32"
        stroke="#ffe566" stroke-width="1.2" opacity="0.75"/>
  <circle cx="11" cy="32" r="2" fill="#ffe566" opacity="0.8"/>
  <circle cx="49" cy="32" r="2" fill="#ffe566" opacity="0.8"/>

  <!-- Wheel body — top view, longer (38px tall, 18px wide) -->
  <rect x="21" y="13" width="18" height="38" rx="3.5"
        fill="rgba(255,0,204,0.07)"
        stroke="#ff00cc" stroke-width="1.8" opacity="0.85"/>

  <!-- β arc — between dashed axis and velocity arrow at r=11 -->
  <path fill="none" stroke="#ffe566" stroke-width="1.3" opacity="0">
    <!-- M 30,21 = start on axis at r=11, arc to rotated point -->
    <animate attributeName="d"
      values="M30,21 A11,11 0 0,1 30,21;M30,21 A11,11 0 0,1 34.65,22.03;M30,21 A11,11 0 0,1 30,21"
      keyTimes="0;0.5;1"
      dur="5s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <animate attributeName="opacity"
      values="0;0;0.9;0.9;0;0"
      keyTimes="0;0.15;0.35;0.65;0.85;1"
      dur="5s" repeatCount="indefinite"/>
  </path>

  <!-- β label — above the arc, at midpoint angle r=15 -->
  <text x="33.25" y="17.36" font-size="12" fill="#ffe566"
        font-family="monospace" font-weight="bold"
        text-anchor="middle" opacity="0">β
    <animate attributeName="opacity"
      values="0;0;0.95;0.95;0;0"
      keyTimes="0;0.15;0.35;0.65;0.85;1"
      dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- Velocity arrow — slow symmetric pendulum ±25° -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="0 30 32;25 30 32;0 30 32"
      keyTimes="0;0.5;1"
      dur="5s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <!-- Glow -->
    <circle cx="30" cy="9" r="7" fill="#ff00cc" opacity="0.06"/>
    <!-- Shaft -->
    <line x1="30" y1="32" x2="30" y2="12"
          stroke="#ff00cc" stroke-width="2.2" opacity="0.95"/>
    <!-- Arrowhead -->
    <polygon points="30,7 26.5,13.5 33.5,13.5" fill="#ff00cc" opacity="0.95"/>
    <!-- v label -->
    <text x="32.5" y="18" font-size="8" fill="#ff00cc"
          font-family="monospace" opacity="0.55">v</text>
  </g>

</svg>
